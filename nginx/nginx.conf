events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Define the backend upstream (points to the FastAPI Docker container)
    upstream backend_api {
        server web:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # 1. Route standard API requests to FastAPI
        location /api/ {
            proxy_pass http://backend_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Route WebSocket connections for real-time dashboards
        location /ws {
            proxy_pass http://backend_api/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. Placeholder for the Frontend (React/Streamlit/etc.)
      # 3. Route standard web traffic to the Streamlit Frontend
       # 3. Route standard web traffic to your custom HTML Frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}