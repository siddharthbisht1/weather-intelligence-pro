<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master AI - Admin Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0B1120; 
            color: white; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        #particles-js { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
        }

        .glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(168, 85, 247, 0.2); 
            border-radius: 24px; 
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.1);
        }

        .login-card { 
            padding: 50px; 
            width: 100%; 
            max-width: 450px; 
            z-index: 10; 
        }

        .logo { text-align: center; margin-bottom: 35px; }
        .logo h1 { font-size: 24px; font-weight: 700; margin: 10px 0 5px 0; color: white; letter-spacing: 2px;}
        .logo p { color: #A855F7; font-size: 14px; margin: 0; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;}

        .input-box { position: relative; margin-bottom: 25px; }
        .input-box i { 
            position: absolute; 
            left: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: #94A3B8; 
        }
        
        .input-box input { 
            width: 100%; 
            padding: 15px 15px 15px 45px; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            font-size: 14px; 
            outline: none; 
            transition: 0.3s; 
            box-sizing: border-box; 
        }
        .input-box input:focus { 
            border-color: #A855F7; 
            background: rgba(168, 85, 247, 0.05); 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        .login-btn { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, #A855F7, #7E22CE); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-family: 'Poppins', sans-serif; 
            margin-bottom: 15px; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .login-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4); 
        }

        .login-footer { 
            text-align: center; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            padding-top: 20px; 
            margin-top: 20px;
        }
        .login-footer p { color: #64748B; font-size: 12px; margin: 5px 0; }
        
        /* Subtle Return Link */
        .return-link {
            color: #64748B;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s ease;
            display: inline-block;
            margin-top: 10px;
        }
        .return-link:hover { color: #A855F7; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container" style="width: 100%; display: flex; justify-content: center; padding: 20px;">
        <div class="login-card glass">
            
            <div class="logo">
                <i class="fa-solid fa-user-shield" style="font-size: 50px; color: #A855F7; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.6));"></i>
                <h1>MASTER AI</h1>
                <p>Command Center Access</p>
            </div>

            <form id="adminLoginForm">
                <div class="input-box">
                    <i class="fas fa-id-badge"></i>
                    <input type="text" id="adminId" placeholder="Admin ID / Email" required autocomplete="off">
                </div>
                
                <div class="input-box">
                    <i class="fas fa-key"></i>
                    <input type="password" id="adminPass" placeholder="Security Passkey" required>
                </div>

                <button type="submit" id="adminSubmitBtn" class="login-btn">
                    Authorize Entry <i class="fas fa-fingerprint"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>Restricted System. Authorized Personnel Only.</p>
                <a href="login.html" class="return-link"><i class="fas fa-arrow-left"></i> Return to User Portal</a>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // Particles.js Initialization (Purple theme for Admin)
            if (typeof particlesJS !== "undefined") {
                particlesJS("particles-js", {
                    particles: {
                        number: { value: 40, density: { enable: true, value_area: 800 } },
                        color: { value: "#A855F7" },
                        shape: { type: "polygon", polygon: { nb_sides: 6 } },
                        opacity: { value: 0.4, random: true },
                        size: { value: 4, random: true },
                        line_linked: { enable: true, distance: 150, color: "#A855F7", opacity: 0.3, width: 1 },
                        move: { enable: true, speed: 1, direction: "none", random: true, out_mode: "out" }
                    },
                    interactivity: {
                        detect_on: "canvas",
                        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "repulse" }, resize: true },
                        modes: { grab: { distance: 140, line_linked: { opacity: 0.8 } }, repulse: { distance: 200, duration: 0.4 } }
                    },
                    retina_detect: true
                });
            }

            // Admin Backend Connectivity Logic
            document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
                e.preventDefault(); 
                
                const adminId = document.getElementById('adminId').value;
                const adminPass = document.getElementById('adminPass').value;
                const btn = document.getElementById('adminSubmitBtn');
                
                btn.innerHTML = 'Verifying Credentials... <i class="fas fa-circle-notch fa-spin"></i>';
                btn.style.opacity = '0.8';

                try {

                    const response = await fetch('http://localhost:8000/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ admin_id: adminId, password: adminPass })
                    });
                    const data = await response.json();
                    
                    if(data.success && data.role === 'admin') {
                        sessionStorage.setItem('adminToken', data.token);
                        window.location.href = 'master-dashboard.html';
                    } else {
                        alert("Access Denied. Invalid Admin Credentials.");
                        btn.innerHTML = 'Authorize Entry <i class="fas fa-fingerprint"></i>';
                        btn.style.opacity = '1';
                    }
 

                   // MOCK REDIRECT (For testing frontend flow)
                   setTimeout(() => {
                        window.location.href = 'master-dashboard.html';
                   }, 1200);

                } catch(err) {
                    console.error(err);
                    alert("Command Center Offline.");
                    btn.innerHTML = 'Authorize Entry <i class="fas fa-fingerprint"></i>';
                    btn.style.opacity = '1';
                }
            });
        });
    </script>
</body>
</html>
